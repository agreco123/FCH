// Data abstraction layer — reads from Supabase with localStorage cache/fallback
const DB = {
  _cache: {},
  _cacheKey: (table) => `wny-v10-cache-${table}`,

  // Save to localStorage cache
  _toCache(table, data) {
    try {
      localStorage.setItem(this._cacheKey(table), JSON.stringify({ data, ts: Date.now() }));
      this._cache[table] = data;
    } catch (e) {}
  },

  // Read from localStorage cache
  _fromCache(table) {
    if (this._cache[table]) return this._cache[table];
    try {
      const raw = localStorage.getItem(this._cacheKey(table));
      if (raw) {
        const parsed = JSON.parse(raw);
        this._cache[table] = parsed.data;
        return parsed.data;
      }
    } catch (e) {}
    return null;
  },

  // Generic fetch with cache fallback
  async fetch(table, query) {
    if (!supabase) return this._fromCache(table) || [];
    try {
      const { data, error } = await (query || supabase.from(table).select('*'));
      if (error) throw error;
      this._toCache(table, data);
      supabaseConnected = true;
      return data || [];
    } catch (e) {
      console.warn(`Supabase fetch ${table} failed:`, e);
      supabaseConnected = false;
      return this._fromCache(table) || [];
    }
  },

  // Fetch municipalities with their tasks (joined)
  async fetchMunicipalities() {
    const munis = await this.fetch('municipalities');
    return munis;
  },

  // Fetch task templates for a municipality
  async fetchTaskTemplates(municipalityId) {
    if (!supabase) return this._fromCache(`tasks-${municipalityId}`) || [];
    try {
      const { data, error } = await supabase
        .from('task_templates')
        .select('*')
        .eq('municipality_id', municipalityId)
        .order('sort_order');
      if (error) throw error;
      this._toCache(`tasks-${municipalityId}`, data);
      return data || [];
    } catch (e) {
      return this._fromCache(`tasks-${municipalityId}`) || [];
    }
  },

  // Fetch all task templates (for initial load)
  async fetchAllTaskTemplates() {
    const data = await this.fetch('task_templates',
      supabase?.from('task_templates').select('*').order('sort_order')
    );
    return data;
  },

  // Fetch developments
  async fetchDevelopments() {
    return this.fetch('developments',
      supabase?.from('developments').select('*').order('created_at', { ascending: false })
    );
  },

  // Fetch development tasks
  async fetchDevTasks(developmentId) {
    if (!supabase) return this._fromCache(`dev-tasks-${developmentId}`) || [];
    try {
      const { data, error } = await supabase
        .from('development_tasks')
        .select('*, task_template:task_templates(*)')
        .eq('development_id', developmentId);
      if (error) throw error;
      this._toCache(`dev-tasks-${developmentId}`, data);
      return data || [];
    } catch (e) {
      return this._fromCache(`dev-tasks-${developmentId}`) || [];
    }
  },

  // Create a development
  async createDevelopment(dev) {
    if (!supabase) {
      // localStorage fallback
      const id = crypto.randomUUID?.() || Date.now().toString(36);
      const newDev = { ...dev, id, created_at: new Date().toISOString() };
      const list = JSON.parse(localStorage.getItem('wny-v10-dev-list') || '[]');
      list.push(newDev);
      localStorage.setItem('wny-v10-dev-list', JSON.stringify(list));
      return newDev;
    }
    const { data, error } = await supabase.from('developments').insert(dev).select().single();
    if (error) throw error;
    return data;
  },

  // Create development tasks
  async createDevTasks(tasks) {
    if (!supabase) {
      localStorage.setItem(`wny-v10-dev-tasks-${tasks[0]?.development_id}`, JSON.stringify(tasks));
      return tasks;
    }
    const { data, error } = await supabase.from('development_tasks').insert(tasks).select();
    if (error) throw error;
    return data;
  },

  // Update development task status
  async updateDevTaskStatus(taskId, status) {
    if (!supabase) return;
    const updates = { status, updated_at: new Date().toISOString() };
    if (status === 'in_progress') updates.actual_start = new Date().toISOString().slice(0, 10);
    if (status === 'complete') updates.actual_end = new Date().toISOString().slice(0, 10);
    const { error } = await supabase.from('development_tasks').update(updates).eq('id', taskId);
    if (error) console.error('Status update failed:', error);
  },

  // Update development
  async updateDevelopment(id, updates) {
    if (!supabase) {
      const list = JSON.parse(localStorage.getItem('wny-v10-dev-list') || '[]');
      const idx = list.findIndex(d => d.id === id);
      if (idx >= 0) { list[idx] = { ...list[idx], ...updates }; localStorage.setItem('wny-v10-dev-list', JSON.stringify(list)); }
      return;
    }
    const { error } = await supabase.from('developments').update(updates).eq('id', id);
    if (error) console.error('Dev update failed:', error);
  },

  // Delete development
  async deleteDevelopment(id) {
    if (!supabase) {
      const list = JSON.parse(localStorage.getItem('wny-v10-dev-list') || '[]').filter(d => d.id !== id);
      localStorage.setItem('wny-v10-dev-list', JSON.stringify(list));
      localStorage.removeItem(`wny-v10-dev-tasks-${id}`);
      return;
    }
    await supabase.from('development_tasks').delete().eq('development_id', id);
    await supabase.from('developments').delete().eq('id', id);
  },

  // Fetch reference data
  async fetchCostEstimates() { return this.fetch('cost_estimates'); },
  async fetchContacts() { return this.fetch('contacts'); },
  async fetchDocChecklist() { return this.fetch('doc_checklist',
    supabase?.from('doc_checklist').select('*').order('sort_order')
  ); },
  async fetchBoardMeetings(municipalityId) {
    if (!supabase) return this._fromCache(`meetings-${municipalityId}`) || [];
    try {
      const { data, error } = await supabase
        .from('board_meetings')
        .select('*')
        .eq('municipality_id', municipalityId)
        .gte('meeting_date', new Date().toISOString().slice(0,10))
        .order('meeting_date')
        .limit(50);
      if (error) throw error;
      this._toCache(`meetings-${municipalityId}`, data);
      return data || [];
    } catch (e) {
      return this._fromCache(`meetings-${municipalityId}`) || [];
    }
  },
  async fetchHolidays() { return this.fetch('holidays'); },

  // Connection status
  isConnected() { return supabaseConnected; }
};

// Convert Supabase task_template row to V9-compatible task object
function templateToTask(t) {
  return {
    id: t.task_code,
    _templateId: t.id,
    name: t.name,
    phase: t.phase,
    category: t.category,
    min: t.min_days,
    avg: t.avg_days,
    max: t.max_days,
    p10: t.p10_days,
    p50: t.p50_days,
    p90: t.p90_days,
    sample_size: t.sample_size || 0,
    dependencies: typeof t.dependencies === 'string' ? JSON.parse(t.dependencies) : (t.dependencies || []),
    responsible: t.responsible,
    notes: t.notes,
    confidence: t.confidence,
    risk: t.risk,
    risk_desc: t.risk_desc,
    is_conditional: t.is_conditional,
    condition_key: t.condition_key,
    seasonal_category: t.seasonal_category,
    board_dependent: t.board_dependent,
  };
}

// Convert Supabase municipality row to V9-compatible town object
function muniToTown(m, tasks) {
  const phaseOrder = typeof m.phase_order === 'string' ? JSON.parse(m.phase_order) : (m.phase_order || []);
  const contact = typeof m.contact === 'string' ? JSON.parse(m.contact) : (m.contact || {});
  return {
    id: m.slug,
    _muniId: m.id,
    label: m.label,
    fullName: m.full_name,
    county: m.county,
    state: m.state,
    authority: m.authority,
    chapterRef: m.chapter_ref,
    effectiveDate: m.effective_date,
    status: m.status,
    planningBoard: m.pb_schedule,
    townBoard: m.tb_schedule,
    pb_meeting_rule: m.pb_meeting_rule,
    tb_meeting_rule: m.tb_meeting_rule,
    submission_deadline_days: m.submission_deadline_days,
    contact,
    notes: m.notes,
    tasks: tasks.map(templateToTask),
    phaseOrder,
    is_dual_board: m.is_dual_board,
  };
}

function computeSchedule(tasks){
  const map={};
  tasks.forEach(t=>{map[t.id]={...t,startDay:0,endDay:0}});
  function resolve(id){
    const t=map[id];if(!t)return 0;if(t._resolved)return t.startDay;t._resolved=true;
    const deps=t.dependencies||t.deps||[];
    if(!deps.length){t.startDay=0}
    else{t.startDay=Math.max(...deps.map(dep=>{if(!map[dep])return 0;resolve(dep);return map[dep].endDay}))}
    t.endDay=t.startDay+(t.avg||1);return t.startDay;
  }
  tasks.forEach(t=>resolve(t.id));return map;
}

  get(_, prop) { return _getTowns()[prop]; },
  has(_, prop) { return prop in _getTowns(); },
  ownKeys() { return Object.keys(_getTowns()); },
  getOwnPropertyDescriptor(_, prop) {
    if (prop in _getTowns()) return { configurable: true, enumerable: true, value: _getTowns()[prop] };

});

  get(_, prop) {
    if (prop === 'length') return _getTownOrder().length;
    if (prop === Symbol.iterator) return _getTownOrder()[Symbol.iterator].bind(_getTownOrder());
    if (typeof prop === 'string' && !isNaN(prop)) return _getTownOrder()[Number(prop)];
    if (prop === 'map') return _getTownOrder().map.bind(_getTownOrder());
    if (prop === 'forEach') return _getTownOrder().forEach.bind(_getTownOrder());
    if (prop === 'filter') return _getTownOrder().filter.bind(_getTownOrder());

    if (prop === 'includes') return _getTownOrder().includes.bind(_getTownOrder());
    if (prop === 'slice') return _getTownOrder().slice.bind(_getTownOrder());
    return _getTownOrder()[prop];
  },
  has(_, prop) { return prop in _getTownOrder(); },
});

function InlineEdit({value,onChange,type="text",mono,style:xs,placeholder}){
  const[editing,setEditing]=useState(false);const[draft,setDraft]=useState(value);const inputRef=useRef(null);
  useEffect(()=>{setDraft(value)},[value]);useEffect(()=>{if(editing&&inputRef.current)inputRef.current.focus()},[editing]);
  if(!editing)return(<span onClick={e=>{e.stopPropagation();setEditing(true)}} title="Click to edit" style={{cursor:"pointer",borderBottom:"1px dashed rgba(255,255,255,0.15)",paddingBottom:1,fontFamily:mono?S.monoFont:"inherit",...xs}} onMouseEnter={e=>e.currentTarget.style.borderBottomColor="rgba(99,102,241,0.5)"} onMouseLeave={e=>e.currentTarget.style.borderBottomColor="rgba(255,255,255,0.15)"}>{value===""||value===undefined?(placeholder||"—"):String(value)}</span>);
  const commit=()=>{setEditing(false);if(type==="number"){const n=parseFloat(draft);onChange(isNaN(n)?0:n)}else onChange(draft)};
  return(<input ref={inputRef} type={type} value={draft} onChange={e=>setDraft(e.target.value)} onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setDraft(value);setEditing(false)}}} onClick={e=>e.stopPropagation()} style={{background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.4)",borderRadius:6,padding:"2px 6px",color:"#e2e8f0",fontSize:"inherit",fontFamily:mono?S.monoFont:S.fontFamily,outline:"none",width:type==="number"?52:"100%",...xs}}/>)
}

function InlineTextarea({value,onChange,style:xs,placeholder}){
  const[editing,setEditing]=useState(false);const[draft,setDraft]=useState(value);const ref=useRef(null);
  useEffect(()=>{setDraft(value)},[value]);useEffect(()=>{if(editing&&ref.current){ref.current.focus();ref.current.style.height="auto";ref.current.style.height=ref.current.scrollHeight+"px"}},[editing]);
  if(!editing)return(<span onClick={e=>{e.stopPropagation();setEditing(true)}} title="Click to edit" style={{cursor:"pointer",borderBottom:"1px dashed rgba(255,255,255,0.1)",display:"inline",...xs}} onMouseEnter={e=>e.currentTarget.style.borderBottomColor="rgba(99,102,241,0.4)"} onMouseLeave={e=>e.currentTarget.style.borderBottomColor="rgba(255,255,255,0.1)"}>{value||(placeholder||"—")}</span>);

// Development Manager — V9 features
// This is "page 2" — loaded when user creates/opens a development

function DevManager({devId,onBack}){
  const[devData,setDevData]=useState(()=>loadDevData(devId));
  const[activeTab,setActiveTab]=useState("overview");
  const[selectedTask,setSelectedTask]=useState(null);
  const[saveLabel,setSaveLabel]=useState("Saved");
  const saveTimer=useRef(null);

  const town=devData?TOWNS[devData.townId]:null;
  const schedule=useMemo(()=>devData?computeSchedule(devData.tasks):{},[devData?.tasks]);
  const statuses=devData?.statuses||{};

  const persist=(newData)=>{
    setDevData(newData);setSaveLabel("Saving...");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{saveDevData(newData.id,newData);setSaveLabel("Saved "+new Date().toLocaleTimeString())},1500);
  };

  const handleStatusChange=(taskId,newStatus)=>{
    if(!devData)return;
    persist({...devData,statuses:{...devData.statuses,[taskId]:newStatus}});
  };

  if(!devData||!town)return(
    <div style={{fontFamily:S.fontFamily,background:"#0c0f1a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:32,marginBottom:16}}>⚠</div>
        <div>Development not found</div>
        <button onClick={onBack} style={{marginTop:16,background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.3)",borderRadius:8,padding:"8px 20px",color:"#a5b4fc",cursor:"pointer",fontFamily:S.fontFamily}}>← Back to Tracker</button>
      </div>
    </div>
  );

  const tasks=devData.tasks;
  const PO=town.phaseOrder;
  const total=tasks.length;
  const complete=tasks.filter(t=>(statuses[t.id]||"not_started")==="complete").length;
  const inProg=tasks.filter(t=>(statuses[t.id]||"not_started")==="in_progress").length;
  const blocked=tasks.filter(t=>(statuses[t.id]||"not_started")==="blocked").length;
  const waiting=tasks.filter(t=>(statuses[t.id]||"not_started")==="waiting").length;
  const risks=tasks.filter(t=>t.risk).length;
  const pct=total?Math.round(complete/total*100):0;
  const maxEnd=Math.max(...Object.values(schedule).map(s=>s.endDay||0),1);
  const startDate=devData.startDate||new Date().toISOString().slice(0,10);

  const TABS=[
    {key:"overview",label:"Overview",icon:"◉"},
    {key:"tasks",label:"Tasks",icon:"☰"},
    {key:"timeline",label:"Timeline",icon:"▦"},
    {key:"risks",label:"Risks",icon:"⚠"},
    {key:"contacts",label:"Contacts",icon:"☎"},
    {key:"costs",label:"Costs",icon:"$"},
    {key:"docs",label:"Docs",icon:"📋"},
    {key:"notes",label:"Notes",icon:"✎"},
    {key:"milestones",label:"Milestones",icon:"◆"},
    {key:"compare",label:"Compare",icon:"⇆"},
    {key:"export",label:"Export",icon:"↓"},
    {key:"settings",label:"Settings",icon:"⚙"},
  ];

  return(
    <div style={{fontFamily:S.fontFamily,background:"linear-gradient(145deg,#0c0f1a 0%,#111827 50%,#0c1220 100%)",minHeight:"100vh",color:"#e2e8f0"}}>
      {/* Header */}
      <div style={{padding:"12px 20px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <button onClick={onBack} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"6px 12px",color:"#94a3b8",cursor:"pointer",fontFamily:S.fontFamily,fontSize:12}}>← Tracker</button>
        <div style={{flex:1,minWidth:200}}>
          <h1 style={{fontSize:18,fontWeight:700,letterSpacing:"-0.02em"}}>{devData.name}</h1>
          <span style={{fontSize:11,color:"#64748b"}}>{town.label} — {town.county} — {town.chapterRef}</span>
        </div>
        <span style={{fontSize:10,color:"#475569"}}>{saveLabel}</span>
      </div>

      {/* Tab nav */}
      <div style={{padding:"0 20px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",gap:2,overflowX:"auto"}}>
        {TABS.map(tab=>(
          <button key={tab.key} onClick={()=>setActiveTab(tab.key)} style={{padding:"10px 14px",background:activeTab===tab.key?"rgba(99,102,241,0.12)":"transparent",border:"none",borderBottom:activeTab===tab.key?"2px solid #6366f1":"2px solid transparent",color:activeTab===tab.key?"#a5b4fc":"#64748b",fontSize:12,cursor:"pointer",fontFamily:S.fontFamily,fontWeight:activeTab===tab.key?600:400,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:13}}>{tab.icon}</span>{tab.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{padding:20,maxWidth:1400,margin:"0 auto"}}>

        {/* OVERVIEW */}
        {activeTab==="overview"&&(
          <div style={{animation:"fadeSlideIn 0.3s ease"}}>

              <StatCard label="Blocked" value={blocked} icon="⊘" color="#ef4444"/>
              <StatCard label="Duration" value={`${maxEnd}d`} sub={`${fmtDate(startDate)} → ${fmtDate(addDays(startDate,maxEnd))}`} color="#06b6d4"/>

        {/* RISKS */}

          <div style={{animation:"fadeSlideIn 0.3s ease"}}>
            <div style={{fontSize:12,color:"#64748b",marginBottom:16}}>{risks} risk-flagged tasks</div>
            {tasks.filter(t=>t.risk).map(task=>{const st=statuses[task.id]||"not_started";const stObj=getStatus(st);const rd=task.riskDesc||task.risk_desc||"";return(
              <div key={task.id} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:16,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                  <div><div style={{fontSize:14,fontWeight:500,marginBottom:4}}>{task.name}</div><div style={{display:"flex",gap:8,alignItems:"center"}}><PhaseBadge phase={task.phase}/><span style={{fontSize:11,color:stObj.color}}>{stObj.icon} {stObj.label}</span></div></div>
                  <span style={{fontFamily:S.monoFont,fontSize:11,color:"#475569"}}>{task.min}/{task.avg}/{task.max}d</span>

                  {g.items.map((item,i)=>(<div key={i} style={{display:"flex",gap:8,marginBottom:6,fontSize:12}}><span style={{color:"#475569",minWidth:60}}>{item.label}:</span><span>{item.value}</span></div>))}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* COSTS */}
        {activeTab==="costs"&&(
          <div style={{animation:"fadeSlideIn 0.3s ease",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(300px,1fr))",gap:12}}>
            {COST_ESTIMATES.map(cat=>(
              <div key={cat.category} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:16}}>
                <div style={{fontSize:13,fontWeight:600,marginBottom:12,color:"#6366f1"}}>{cat.category}</div>
                {cat.items.map((item,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:12}}><span style={{color:"#64748b"}}>{item.name}</span><span style={{fontFamily:S.monoFont}}>{item.range}</span></div>))}
              </div>
            ))}
          </div>
        )}

        {/* DOCS */}
        {activeTab==="docs"&&(<DevDocs/>)}

        {/* NOTES */}
        {activeTab==="notes"&&(
          <DevNotes devData={devData} onSave={notes=>persist({...devData,notes})}/>
        )}

        {/* MILESTONES */}
        {activeTab==="milestones"&&(
          <div style={{animation:"fadeSlideIn 0.3s ease"}}>
            {tasks.filter(t=>t.category==="Milestone").map(task=>{const st=statuses[task.id]||"not_started";const stObj=getStatus(st);const sc=schedule[task.id];return(
              <div key={task.id} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:14,display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                <span style={{fontSize:20,color:stObj.color}}>{stObj.icon}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{task.name}</div><div style={{display:"flex",gap:8,alignItems:"center",marginTop:2}}><PhaseBadge phase={task.phase}/><span style={{fontSize:11,color:"#475569"}}>Est: {sc?fmtDate(addDays(startDate,sc.startDay)):"—"}</span></div></div>
                <span style={{fontSize:11,color:stObj.color,fontWeight:500}}>{stObj.label}</span>
              </div>
            )})}
          </div>
        )}

        {/* COMPARE */}
        {activeTab==="compare"&&(<DevCompare/>)}

        {/* EXPORT */}
        {activeTab==="export"&&(
          <div style={{animation:"fadeSlideIn 0.3s ease"}}>
            <button onClick={()=>{const b=new Blob([JSON.stringify(devData,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`${devData.name.replace(/\s+/g,"_")}_export.json`;a.click();URL.revokeObjectURL(u)}} style={{background:"#6366f1",border:"none",borderRadius:8,padding:"10px 24px",color:"#fff",fontSize:13,fontWeight:500,cursor:"pointer",fontFamily:S.fontFamily}}>Download JSON</button>
            <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:16,marginTop:20,maxHeight:400,overflow:"auto"}}><pre style={{fontSize:11,fontFamily:S.monoFont,color:"#64748b",whiteSpace:"pre-wrap"}}>{JSON.stringify(devData,null,2).slice(0,3000)}...</pre></div>
          </div>
        )}

        {/* SETTINGS */}
        {activeTab==="settings"&&(
          <DevSettings devData={devData} town={town} onSave={persist} onDelete={()=>{deleteDevStorage(devData.id);const l=loadDevList().filter(d=>d.id!==devData.id);saveDevList(l);onBack()}} onBack={onBack}/>
        )}
      </div>

      {/* Task Detail Modal */}
      {selectedTask&&(
        <div onClick={()=>setSelectedTask(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0f1225",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:0,maxWidth:600,width:"100%",maxHeight:"85vh",overflow:"auto",animation:"fadeSlideIn 0.3s ease"}}>
            <div style={{padding:"20px 24px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
                <div><h3 style={{fontSize:18,fontWeight:600,marginBottom:8}}>{selectedTask.name}</h3><div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}><PhaseBadge phase={selectedTask.phase}/><span style={{fontSize:11,color:"#64748b"}}>{selectedTask.category}</span>{selectedTask.risk&&<span style={{fontSize:11,color:"#ef4444",fontWeight:600}}>⚠ RISK</span>}</div></div>
                <button onClick={()=>setSelectedTask(null)} style={{background:"none",border:"none",color:"#64748b",fontSize:22,cursor:"pointer"}}>×</button>
              </div>
            </div>
            <div style={{padding:"16px 24px"}}>
              <div style={{marginBottom:16}}><div style={{fontSize:11,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.5px"}}>Status</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {STATUSES.map(st=>{const cur=statuses[selectedTask.id]||"not_started";return(
                    <button key={st.key} onClick={()=>handleStatusChange(selectedTask.id,st.key)} style={{padding:"8px 12px",borderRadius:8,fontSize:12,fontWeight:500,cursor:"pointer",display:"flex",alignItems:"center",gap:6,border:cur===st.key?`2px solid ${st.color}`:"1px solid rgba(255,255,255,0.06)",background:cur===st.key?`${st.color}22`:"rgba(255,255,255,0.02)",color:cur===st.key?st.color:"#64748b",boxShadow:cur===st.key?`0 0 12px ${st.color}33`:"none",fontFamily:S.fontFamily}}><span>{st.icon}</span>{st.label}</button>
                  )})}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                <div style={{background:"rgba(255,255,255,0.02)",borderRadius:8,padding:12}}><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Duration</div><div style={{fontFamily:S.monoFont,fontSize:14}}><span style={{color:"#22c55e"}}>{selectedTask.min}d</span> / <span style={{color:"#f59e0b"}}>{selectedTask.avg}d</span> / <span style={{color:"#ef4444"}}>{selectedTask.max}d</span></div></div>
                <div style={{background:"rgba(255,255,255,0.02)",borderRadius:8,padding:12}}><div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Responsible</div><div style={{fontSize:13}}>{selectedTask.responsible}</div></div>
              </div>
              {selectedTask.notes&&<div style={{marginBottom:16}}><div style={{fontSize:11,color:"#64748b",marginBottom:6,textTransform:"uppercase"}}>Notes</div><div style={{background:"rgba(255,255,255,0.02)",borderRadius:8,padding:12,fontSize:13,lineHeight:1.5,color:"#94a3b8"}}>{selectedTask.notes}</div></div>}
              {selectedTask.risk&&(selectedTask.riskDesc||selectedTask.risk_desc)&&<div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,padding:12}}><div style={{fontSize:11,color:"#ef4444",fontWeight:600,marginBottom:4}}>⚠ Risk</div><div style={{fontSize:13,color:"#fca5a5"}}>{selectedTask.riskDesc||selectedTask.risk_desc}</div></div>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Sub-components for DevManager tabs

function DevGantt({tasks,statuses,schedule,town,startDate,onStatusChange,onSelectTask}){
  const[zoom,setZoom]=useState("month");
  const PO=town.phaseOrder;
  const maxEnd=Math.max(...Object.values(schedule).map(s=>s.endDay||0),1);
  const dayW={week:8,month:3,quarter:1}[zoom]||3;
  const months=[];const startD=new Date(startDate);
  for(let d=0;d<maxEnd+30;d+=30){const dt=addDays(startD,d);months.push({day:d,label:dt.toLocaleDateString("en-US",{month:"short",year:"2-digit"})});}
  return(
    <div style={{animation:"fadeSlideIn 0.3s ease"}}>
      <div style={{display:"flex",gap:4,marginBottom:12}}>
        {["week","month","quarter"].map(z=>(<button key={z} onClick={()=>setZoom(z)} style={{padding:"4px 10px",borderRadius:6,border:zoom===z?"1px solid #6366f1":"1px solid rgba(255,255,255,0.06)",background:zoom===z?"rgba(99,102,241,0.1)":"transparent",color:zoom===z?"#a5b4fc":"#64748b",fontSize:11,cursor:"pointer",textTransform:"capitalize",fontFamily:S.fontFamily}}>{z}</button>))}
      </div>
      <div style={{overflow:"auto",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12}}>
        <div style={{display:"flex",minWidth:260+maxEnd*dayW+200}}>
          <div style={{width:260,minWidth:260,position:"sticky",left:0,zIndex:10,background:"#0c0f1a"}}>
            <div style={{height:28,borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"0 12px",display:"flex",alignItems:"center",fontSize:10,color:"#475569",fontWeight:600}}>TASK</div>
            {tasks.map(task=>{const st=statuses[task.id]||"not_started";return(
              <div key={task.id} onClick={()=>onSelectTask(task)} style={{height:32,display:"flex",alignItems:"center",gap:5,padding:"0 8px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.03)"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <StatusButton status={st} onClick={()=>onStatusChange(task.id,nextStatus(st))} size={18}/>
                <span style={{width:5,height:5,borderRadius:"50%",background:gpc(task.phase).bar}}/>
                <span style={{fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{task.name}</span>
                {task.risk&&<span style={{fontSize:9,color:"#ef4444"}}>⚠</span>}
              </div>
            )})}
          </div>
          <div style={{flex:1}}>
            <div style={{height:28,borderBottom:"1px solid rgba(255,255,255,0.06)",position:"relative"}}>
              {months.map((m,i)=>(<div key={i} style={{position:"absolute",left:m.day*dayW,fontSize:9,color:"#475569",padding:"0 4px",lineHeight:"28px",borderLeft:"1px solid rgba(255,255,255,0.04)"}}>{m.label}</div>))}
            </div>
            {tasks.map(task=>{const sc=schedule[task.id];if(!sc)return null;const st=statuses[task.id]||"not_started";let barColor=gpc(task.phase).bar;if(st==="complete")barColor="#22c55e";else if(st==="in_progress")barColor="#f59e0b";else if(st==="blocked")barColor="#ef4444";else if(st==="waiting")barColor="#fb923c";const isGlow=st==="in_progress"||st==="blocked";const barW=Math.max((sc.endDay-sc.startDay)*dayW,4);return(
              <div key={task.id} onClick={()=>onSelectTask(task)} style={{height:32,position:"relative",borderBottom:"1px solid rgba(255,255,255,0.03)",cursor:"pointer"}}>
                <div style={{position:"absolute",left:sc.startDay*dayW,top:7,height:18,width:barW,background:barColor,borderRadius:4,opacity:0.85,boxShadow:isGlow?`0 0 8px ${barColor}66`:"none"}}/>
              </div>
            )})}
          </div>
        </div>
      </div>
    </div>
  );
}

function DevDocs(){
  const[checked,setChecked]=useState({});
  return(
    <div style={{animation:"fadeSlideIn 0.3s ease",display:"flex",flexDirection:"column",gap:16}}>
      {DOC_CHECKLIST.map(sec=>{const total=sec.items.length;const done=sec.items.filter((_,i)=>checked[sec.phase+"-"+i]).length;return(
        <div key={sec.phase} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}><span style={{fontSize:13,fontWeight:600}}>{sec.phase}</span><span style={{fontSize:11,fontFamily:S.monoFont,color:done===total?"#22c55e":"#475569"}}>{done}/{total}</span></div>
          {sec.items.map((item,i)=>{const key=sec.phase+"-"+i;return(<label key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",cursor:"pointer",fontSize:12,color:checked[key]?"#22c55e":"#94a3b8"}}><input type="checkbox" checked={!!checked[key]} onChange={()=>setChecked(p=>({...p,[key]:!p[key]}))} style={{accentColor:"#22c55e"}}/><span style={{textDecoration:checked[key]?"line-through":"none"}}>{item}</span></label>)})}
        </div>
      )})}
    </div>
  );
}

function DevNotes({devData,onSave}){
  const[text,setText]=useState(devData.notes||"");
  const[saved,setSaved]=useState(null);
  const timer=useRef(null);
  useEffect(()=>{setText(devData.notes||"")},[devData.id]);
  const handleChange=v=>{setText(v);clearTimeout(timer.current);timer.current=setTimeout(()=>{onSave(v);setSaved(new Date())},1500)};
  return(
    <div style={{animation:"fadeSlideIn 0.3s ease",display:"flex",flexDirection:"column",height:"calc(100vh - 200px)"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:600}}>Development Notes</span>{saved&&<span style={{fontSize:10,color:"#475569"}}>Saved {saved.toLocaleTimeString()}</span>}</div>
      <textarea value={text} onChange={e=>handleChange(e.target.value)} placeholder="Add notes..." style={{flex:1,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:16,color:"#e2e8f0",fontSize:13,lineHeight:1.6,resize:"none",outline:"none",fontFamily:S.fontFamily}}/>
    </div>
  );
}

function DevCompare(){
  const data=useMemo(()=>TO.map(tid=>{const t=TOWNS[tid];const sc=computeSchedule(t.tasks);const maxEnd=Math.max(...Object.values(sc).map(s=>s.endDay||0));return{id:tid,label:t.label,county:t.county,tasks:t.tasks.length,days:maxEnd,risks:t.tasks.filter(tk=>tk.risk).length,phases:t.phaseOrder.length,notes:t.notes}}),[]);
  return(
    <div style={{animation:"fadeSlideIn 0.3s ease",overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr style={{borderBottom:"2px solid rgba(255,255,255,0.06)"}}>
          {["Town","County","Tasks","Duration","Risks","Phases","Notes"].map(h=>(<th key={h} style={{padding:"8px 12px",textAlign:"left",color:"#64748b",fontWeight:600,fontSize:11,textTransform:"uppercase"}}>{h}</th>))}
        </tr></thead>
        <tbody>{data.map(d=>(<tr key={d.id} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
          <td style={{padding:"10px 12px",fontWeight:500}}>{d.label}</td><td style={{padding:"10px 12px",color:"#64748b"}}>{d.county}</td><td style={{padding:"10px 12px",fontFamily:S.monoFont}}>{d.tasks}</td><td style={{padding:"10px 12px",fontFamily:S.monoFont}}>{d.days}d</td><td style={{padding:"10px 12px",fontFamily:S.monoFont,color:d.risks>10?"#ef4444":"inherit"}}>{d.risks}</td><td style={{padding:"10px 12px",fontFamily:S.monoFont}}>{d.phases}</td><td style={{padding:"10px 12px",color:"#475569",maxWidth:300,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.notes}</td>
        </tr>))}</tbody>
      </table>
    </div>
  );
}

function DevSettings({devData,town,onSave,onDelete,onBack}){
  const[name,setName]=useState(devData.name);
  const[date,setDate]=useState(devData.startDate||new Date().toISOString().slice(0,10));
  const[confirmDel,setConfirmDel]=useState(false);
  return(
    <div style={{animation:"fadeSlideIn 0.3s ease",maxWidth:480}}>
      <div style={{marginBottom:20}}><label style={{fontSize:12,color:"#64748b",display:"block",marginBottom:6}}>Development Name</label><div style={{display:"flex",gap:8}}><input value={name} onChange={e=>setName(e.target.value)} style={{flex:1,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"8px 12px",color:"#e2e8f0",fontSize:13,fontFamily:S.fontFamily,outline:"none"}}/><button onClick={()=>{onSave({...devData,name});const l=loadDevList().map(d=>d.id===devData.id?{...d,name}:d);saveDevList(l)}} style={{background:"#6366f1",border:"none",borderRadius:8,padding:"8px 16px",color:"#fff",fontSize:12,cursor:"pointer",fontFamily:S.fontFamily}}>Save</button></div></div>
      <div style={{marginBottom:20}}><label style={{fontSize:12,color:"#64748b",display:"block",marginBottom:6}}>Start Date</label><input type="date" value={date} onChange={e=>{setDate(e.target.value);onSave({...devData,startDate:e.target.value})}} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"8px 12px",color:"#e2e8f0",fontSize:13,fontFamily:S.fontFamily,outline:"none"}}/></div>
      <div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:16,marginBottom:20}}><div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Town: {town.label}</div><div style={{fontSize:12,color:"#64748b"}}>{town.county} — {town.chapterRef}</div><div style={{fontSize:11,color:"#475569",marginTop:8}}>{town.notes}</div></div>
      <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:20}}>
        {!confirmDel?(<button onClick={()=>setConfirmDel(true)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,padding:"8px 20px",color:"#ef4444",fontSize:12,cursor:"pointer",fontFamily:S.fontFamily}}>Delete Development</button>):(
          <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:12,color:"#ef4444"}}>Confirm delete?</span><button onClick={onDelete} style={{background:"#ef4444",border:"none",borderRadius:8,padding:"8px 16px",color:"#fff",fontSize:12,cursor:"pointer",fontFamily:S.fontFamily}}>Yes</button><button onClick={()=>setConfirmDel(false)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"8px 16px",color:"#94a3b8",fontSize:12,cursor:"pointer",fontFamily:S.fontFamily}}>Cancel</button></div>
        )}
      </div>
    </div>
  );
}




// ============================================================================
// V10 APP SHELL — Supabase-aware data loading
// ============================================================================

// Connection status indicator
function ConnStatus() {
  const [status, setStatus] = useState(DB.isConnected() ? 'connected' : 'checking');
  useEffect(() => {
    const check = async () => {
      if (!supabase || SUPABASE_ANON_KEY === "PASTE_YOUR_ANON_KEY_HERE") {
        setStatus('offline');
        return;
      }
      try {
        const { error } = await supabase.from('municipalities').select('id').limit(1);
        setStatus(error ? 'error' : 'connected');
      } catch { setStatus('error'); }
    };
    check();
    const interval = setInterval(check, 30000);
    return () => clearInterval(interval);
  }, []);
  const colors = { connected: 'conn-green', checking: 'conn-yellow', offline: 'conn-yellow', error: 'conn-red' };
  const labels = { connected: 'Supabase', checking: 'Connecting...', offline: 'Offline Mode', error: 'Supabase Error' };
  return (
    <span style={{fontSize:10,color:'#475569',display:'flex',alignItems:'center',gap:2}}>
      <span className={`conn-dot ${colors[status]}`}/>
      {labels[status]}
    </span>
  );
}

function App(){
  const[page,setPage]=useState("tracker");
  const[loading,setLoading]=useState(true);
  const[towns,setTowns]=useState({});
  const[townOrder,setTownOrder]=useState([]);
  const[devList,setDevList]=useState([]);
  const[costEstimates,setCostEstimates]=useState([]);
  const[docChecklist,setDocChecklist]=useState([]);

  // Load all data from Supabase on mount
  useEffect(()=>{
    (async()=>{
      try {
        // Fetch municipalities
        const munis = await DB.fetchMunicipalities();
        // Fetch all task templates
        const allTasks = await DB.fetchAllTaskTemplates();

        if (munis.length > 0 && allTasks.length > 0) {
          // Group tasks by municipality_id
          const tasksByMuni = {};
          allTasks.forEach(t => {
            if (!tasksByMuni[t.municipality_id]) tasksByMuni[t.municipality_id] = [];
            tasksByMuni[t.municipality_id].push(t);
          });

          // Build TOWNS-compatible object
          const townsObj = {};
          const order = [];
          munis.sort((a,b) => a.slug.localeCompare(b.slug));
          munis.forEach(m => {
            const tasks = tasksByMuni[m.id] || [];
            townsObj[m.slug] = muniToTown(m, tasks);
            order.push(m.slug);
          });
          setTowns(townsObj);
          setTownOrder(order);
        } else {
          console.warn("No Supabase data — check if schema is seeded");
        }

        // Load reference data
        const costs = await DB.fetchCostEstimates();
        if (costs.length > 0) {
          // Group by category for V9 compatibility
          const grouped = {};
          costs.forEach(c => {
            if (!grouped[c.category]) grouped[c.category] = { category: c.category, items: [] };
            const range = (c.range_low != null && c.range_high != null)
              ? `$${Number(c.range_low).toLocaleString()} – $${Number(c.range_high).toLocaleString()}`
              : c.notes || 'Varies';
            grouped[c.category].items.push({ name: c.item_name, range });
          });
          setCostEstimates(Object.values(grouped));
        }

        const docs = await DB.fetchDocChecklist();
        if (docs.length > 0) {
          setDocChecklist(docs.map(d => ({
            phase: d.phase,
            items: typeof d.items === 'string' ? JSON.parse(d.items) : d.items
          })));
        }

        // Load developments
        const devs = await DB.fetchDevelopments();
        if (devs.length > 0) {
          setDevList(devs.map(d => ({
            id: d.id,
            name: d.name,
            townId: munis.find(m => m.id === d.municipality_id)?.slug || '',
            createdAt: d.created_at
          })));
        } else {
          // Try localStorage fallback
          setDevList(loadDevList());
        }

      } catch (e) {
        console.error("Data load error:", e);
        // Fall through — UI will show empty state
      }
      setLoading(false);
    })();
  },[]);

  // Make reference data available globally for V9 component compatibility
  // (COST_ESTIMATES and DOC_CHECKLIST are referenced as globals in DevManager sub-components)
  if (typeof window !== 'undefined') {
    window.COST_ESTIMATES_V10 = costEstimates;
    window.DOC_CHECKLIST_V10 = docChecklist;
  }

  const[showCreateModal,setShowCreateModal]=useState(false);
  const[newDevName,setNewDevName]=useState("");
  const[newDevTown,setNewDevTown]=useState(townOrder[0]||"amherst");

  const handleNewDev=()=>{setShowCreateModal(true)};

  const handleCreateDev=async()=>{
    if(!newDevName.trim()||!towns[newDevTown])return;
    const town=towns[newDevTown];
    const id=genId();
    const tasks=JSON.parse(JSON.stringify(town.tasks));
    const statuses={};
    tasks.forEach(tk=>{statuses[tk.id]="not_started"});
    const newDev={id,name:newDevName.trim(),townId:newDevTown,tasks,statuses,startDate:new Date().toISOString().slice(0,10),notes:"",createdAt:new Date().toISOString()};

    // Save to Supabase if connected
    if (supabase && town._muniId) {
      try {
        const created = await DB.createDevelopment({
          name: newDev.name,
          municipality_id: town._muniId,
          start_date: newDev.startDate,
          status: 'Active'
        });
        newDev.id = created.id;
        // Create development_tasks
        const devTasks = tasks.map((t, i) => ({
          development_id: created.id,
          task_template_id: t._templateId || null,
          task_code: t.id,
          status: 'not_started',
          is_active: !t.is_conditional // Active by default unless conditional
        }));
        await DB.createDevTasks(devTasks);
      } catch (e) {
        console.error("Supabase create failed, saving locally:", e);
      }
    }

    // Always save locally too (offline fallback)
    saveDevData(newDev.id, newDev);
    const newList=[...devList,{id:newDev.id,name:newDev.name,townId:newDevTown,createdAt:newDev.createdAt}];
    setDevList(newList);saveDevList(newList);
    setNewDevName("");setShowCreateModal(false);
    setPage("dev:"+newDev.id);
  };

  const handleOpenDev=(devId)=>{setPage("dev:"+devId)};
  const handleBack=()=>{setDevList(loadDevList());setPage("tracker")};

  // Loading state
  if(loading) return(
    <div style={{fontFamily:S.fontFamily,background:"#0c0f1a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}}>
      <div style={{textAlign:"center",animation:"pulse 1.5s infinite"}}>
        <div style={{fontSize:32,marginBottom:16}}>◉</div>
        <div style={{fontSize:14}}>Loading from Supabase...</div>
        <div style={{fontSize:11,marginTop:8,color:"#334155"}}>{V10_VERSION}</div>
      </div>
    </div>
  );

  // Empty state — no data loaded
  if(townOrder.length===0) return(
    <div style={{fontFamily:S.fontFamily,background:"#0c0f1a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#64748b"}}>
      <div style={{textAlign:"center",maxWidth:500,padding:40}}>
        <div style={{fontSize:48,marginBottom:16}}>⚠</div>
        <h2 style={{fontSize:20,color:"#e2e8f0",marginBottom:12}}>No Data Loaded</h2>
        <p style={{fontSize:13,lineHeight:1.6,marginBottom:20}}>
          The Supabase database appears empty. Please run the schema migration and seed scripts:
        </p>
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:16,textAlign:"left",fontSize:12,fontFamily:S.monoFont,color:"#94a3b8",lineHeight:1.8}}>
          1. 01_schema.sql<br/>
          2. 02_seed_municipalities.sql<br/>
          3. 03_seed_task_templates.sql<br/>
          4. 04_seed_reference_data.sql
        </div>
        <p style={{fontSize:11,color:"#334155",marginTop:16}}>
          Supabase URL: {SUPABASE_URL}<br/>
          Anon Key: {SUPABASE_ANON_KEY === "PASTE_YOUR_ANON_KEY_HERE" ? "⚠ NOT SET — edit index.html" : "✓ Set"}
        </p>
        <ConnStatus/>
      </div>
    </div>
  );

  // Make globals available for V9 components that reference them
  // These are assigned here so they update when state changes
  if (typeof window !== 'undefined') {
    window.__V10_TOWNS = towns;
    window.__V10_TOWN_ORDER = townOrder;
  }

  // Dev manager page
  if(page.startsWith("dev:")){
    const devId=page.slice(4);
    return <DevManager devId={devId} onBack={handleBack}/>;
  }

  // Main tracker page — pass towns data to TrackerView
  return(
    <div>
      {/* V10 Header Bar */}
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:100,background:"rgba(12,15,26,0.95)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"6px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0",fontFamily:S.fontFamily}}>WNY Land Dev Command Center</span>
          <span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:"rgba(99,102,241,0.12)",color:"#a5b4fc",fontFamily:S.monoFont,fontWeight:600}}>V10</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <ConnStatus/>
          <button onClick={handleNewDev} style={{background:"#6366f1",border:"none",borderRadius:8,padding:"6px 16px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:S.fontFamily}}>+ New Development</button>
        </div>
      </div>
      <div style={{paddingTop:40}}>
        <TrackerView onNewDev={handleNewDev}/>
      </div>

      {/* Development list bar at bottom */}
      {devList.length>0&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(15,18,37,0.95)",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"8px 20px",display:"flex",alignItems:"center",gap:8,zIndex:50,backdropFilter:"blur(12px)"}}>
          <span style={{fontSize:11,color:"#475569",fontWeight:600,marginRight:4}}>DEVELOPMENTS:</span>
          <div style={{display:"flex",gap:6,flex:1,overflowX:"auto"}}>
            {devList.map(dev=>(
              <button key={dev.id} onClick={()=>handleOpenDev(dev.id)} style={{background:"rgba(99,102,241,0.08)",border:"1px solid rgba(99,102,241,0.2)",borderRadius:8,padding:"5px 12px",color:"#a5b4fc",fontSize:11,cursor:"pointer",fontFamily:S.fontFamily,fontWeight:500,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:5,height:5,borderRadius:"50%",background:"#6366f1"}}/>
                {dev.name} <span style={{color:"#475569"}}>({towns[dev.townId]?.label||""})</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Create Development Modal */}
      {showCreateModal&&(
        <div onClick={()=>setShowCreateModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#0f1225",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:28,width:420,maxWidth:"90vw",animation:"fadeSlideIn 0.3s ease"}}>
            <h2 style={{fontSize:18,fontWeight:700,marginBottom:4,fontFamily:S.fontFamily}}>New Development</h2>
            <p style={{fontSize:12,color:"#64748b",marginBottom:20}}>Create a project from a town template</p>

            <label style={{fontSize:12,color:"#94a3b8",display:"block",marginBottom:6}}>Development Name</label>
            <input value={newDevName} onChange={e=>setNewDevName(e.target.value)} placeholder="e.g. Maple Ridge Estates" onKeyDown={e=>e.key==="Enter"&&handleCreateDev()} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"10px 14px",color:"#e2e8f0",fontSize:14,fontFamily:S.fontFamily,outline:"none",marginBottom:16}}/>

            <label style={{fontSize:12,color:"#94a3b8",display:"block",marginBottom:6}}>Town Template</label>
            <div style={{display:"grid",gap:6,marginBottom:20,maxHeight:300,overflowY:"auto"}}>
              {townOrder.map(tid=>{const t=towns[tid];if(!t)return null;const isS=newDevTown===tid;return(
                <div key={tid} onClick={()=>setNewDevTown(tid)} style={{background:isS?"rgba(99,102,241,0.12)":"rgba(255,255,255,0.02)",border:isS?"1px solid rgba(99,102,241,0.4)":"1px solid rgba(255,255,255,0.06)",borderRadius:10,padding:"10px 14px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all 0.15s"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:isS?600:400,color:isS?"#e2e8f0":"#94a3b8"}}>{t.label}</div>
                    <div style={{fontSize:10,color:"#475569"}}>{t.county} — {t.tasks.length} tasks — {t.chapterRef}</div>
                  </div>
                  {isS&&<span style={{color:"#6366f1",fontSize:14}}>●</span>}
                </div>
              )})}
            </div>

            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <button onClick={()=>setShowCreateModal(false)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"9px 18px",color:"#94a3b8",fontSize:12,cursor:"pointer",fontFamily:S.fontFamily}}>Cancel</button>
              <button onClick={handleCreateDev} disabled={!newDevName.trim()} style={{background:newDevName.trim()?"#6366f1":"rgba(99,102,241,0.3)",border:"none",borderRadius:8,padding:"9px 24px",color:"#fff",fontSize:12,fontWeight:600,cursor:newDevName.trim()?"pointer":"not-allowed",fontFamily:S.fontFamily}}>Create Development</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
